<!--
  Icon sprite sheet — Maison Soleil booking confirmation page.
  Each <symbol> holds only geometry (no fill/stroke), so colour is set by
  whatever CSS already targets the <svg> that references it via <use>.
  This keeps icons as separate, versionable files without losing
  currentColor theming or paying for 13 separate HTTP requests.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <symbol id="hamburger" viewBox="0 0 24 24">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </symbol>

  <symbol id="sun-compass" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>
  </symbol>

  <symbol id="nav-stay" viewBox="0 0 24 24">
    <path d="M3 10.5 12 4l9 6.5M5 9v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9"/>
  </symbol>

  <symbol id="nav-house" viewBox="0 0 24 24">
    <path d="M4 12l8-8 8 8M6 10v10h12V10"/>
  </symbol>

  <symbol id="map-pin" viewBox="0 0 24 24">
    <circle cx="12" cy="10" r="3"/>
    <path d="M12 21s7-6.5 7-11.5A7 7 0 0 0 5 9.5C5 14.5 12 21 12 21Z"/>
  </symbol>

  <symbol id="cup" viewBox="0 0 24 24">
    <path d="M4 8h16M6 8v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8M9 8V6a3 3 0 0 1 6 0v2"/>
  </symbol>

  <symbol id="envelope" viewBox="0 0 24 24">
    <rect x="3" y="5" width="18" height="14" rx="2"/>
    <path d="m3 7 9 6 9-6"/>
  </symbol>

  <symbol id="sun-weather" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
  </symbol>

  <symbol id="printer" viewBox="0 0 24 24">
    <path d="M6 9V3h12v6M6 18H4a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1h-2M6 14h12v7H6z"/>
  </symbol>

  <symbol id="calendar" viewBox="0 0 24 24">
    <rect x="3" y="5" width="18" height="16" rx="2"/>
    <path d="M8 3v4M16 3v4M3 10h18"/>
  </symbol>

  <symbol id="check" viewBox="0 0 24 24">
    <path d="M20 6 9 17l-5-5"/>
  </symbol>

  <symbol id="house-key" viewBox="0 0 24 24">
    <path d="M3 21h18M6 21V8l6-4 6 4v13M9 21v-6h6v6"/>
  </symbol>

  <symbol id="wifi" viewBox="0 0 24 24">
    <path d="M5 12.5a11 11 0 0 1 14 0M8.5 16a6 6 0 0 1 7 0M12 19.5h.01"/>
  </symbol>

</svg>
